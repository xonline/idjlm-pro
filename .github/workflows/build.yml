name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release with notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          body: |
            ## XDJ Library Manager

            Automatically classify your DJ music library by genre and sub-genre using AI — in bulk.
            Built for DJs with large Latin dance collections.

            ---

            ## Download

            | Platform | Download |
            |----------|----------|
            | 🍎 Mac | [XDJ-Library-Manager-mac.zip](https://github.com/xonline/dj-library-manager/releases/download/latest/XDJ-Library-Manager-mac.zip) |
            | 🪟 Windows | [XDJ-Library-Manager-windows.zip](https://github.com/xonline/dj-library-manager/releases/download/latest/XDJ-Library-Manager-windows.zip) |

            **Mac:** Unzip → right-click `XDJ Library Manager.app` → **Open** → **Open anyway**
            (Only needed the very first time — macOS security on unsigned apps)

            **Windows:** Unzip and double-click `XDJ Library Manager.exe`

            No Python. No Terminal. No installation needed.

            ---

            ## First-time setup

            You need a free Gemini API key to use AI classification.
            1. Go to https://aistudio.google.com/ and sign in with Google
            2. Click Get API key and Create API key
            3. Open the app, go to the Settings tab, paste your key and Save

            ---

            ## What's included

            - Import: scan any folder of MP3s including subfolders, reads all existing tags
            - Analyse: detects BPM, musical key in Camelot notation, energy level 1-10
            - AI Classification: Gemini suggests genre and sub-genre with confidence score
            - Review queue: approve, skip, or manually edit each track's proposed tags
            - Bulk approve: accept everything above a confidence threshold in one click
            - Write tags: saves approved changes to MP3 ID3 tags (genre, comment, BPM, key)
            - Spotify enrichment: optionally pulls year and popularity (needs Spotify API keys)
            - Folder watcher: auto-imports new MP3s dropped into a watched folder
            - Session save/load: resume where you left off
            - Taxonomy editor: add or remove genres and sub-genres on the fly

            Genres included: Salsa (7 sub-genres), Bachata (4), Kizomba (5), Cha Cha, Merengue, Reggaeton, Zouk

            ---

            ## Changelog

            ### v1.0.0 - Initial release
            - First public release
            - Mac and Windows standalone app, no installation needed
            - AI genre and sub-genre classification via Gemini 1.5 Flash
            - BPM, Camelot key, energy analysis via librosa
            - Review queue with bulk approve
            - ID3 tag writer
            - Folder watcher, session save/load, taxonomy editor

  build-mac:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pywebview pyinstaller

      - name: Create .env
        run: cp config.example.env .env

      - name: Build .app
        run: |
          pyinstaller \
            --noconfirm \
            --windowed \
            --name "XDJ Library Manager" \
            --add-data "templates:templates" \
            --add-data "app/static:app/static" \
            --add-data "taxonomy.json:." \
            --add-data ".env:." \
            --hidden-import "engineio.async_drivers.threading" \
            --hidden-import "pkg_resources.py2_compat" \
            --hidden-import "webview.platforms.cocoa" \
            --collect-all webview \
            --collect-all librosa \
            --collect-all mutagen \
            --collect-all flask \
            run_app.py

      - name: Remove quarantine + sign (ad-hoc)
        run: |
          xattr -cr "dist/XDJ Library Manager.app"
          codesign --force --deep --sign - "dist/XDJ Library Manager.app"

      - name: Zip .app
        run: cd dist && zip -r "../XDJ-Library-Manager-mac.zip" "XDJ Library Manager.app"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          files: XDJ-Library-Manager-mac.zip

  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pywebview pyinstaller

      - name: Create .env
        run: copy config.example.env .env

      - name: Build .exe folder
        run: |
          pyinstaller `
            --noconfirm `
            --windowed `
            --name "XDJ Library Manager" `
            --add-data "templates;templates" `
            --add-data "app/static;app/static" `
            --add-data "taxonomy.json;." `
            --add-data ".env;." `
            --hidden-import "engineio.async_drivers.threading" `
            --hidden-import "pkg_resources.py2_compat" `
            --hidden-import "webview.platforms.edgechromium" `
            --hidden-import "webview.platforms.mshtml" `
            --collect-all webview `
            --collect-all librosa `
            --collect-all mutagen `
            --collect-all flask `
            run_app.py

      - name: Zip output
        run: Compress-Archive -Path "dist\XDJ Library Manager" -DestinationPath "XDJ-Library-Manager-windows.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          files: XDJ-Library-Manager-windows.zip
