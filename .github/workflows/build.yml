name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        run: echo "APP_VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Delete existing release and tag if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ env.APP_VERSION }}"
          # Try to delete existing release (ignore errors if it doesn't exist)
          RELEASE_ID=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('id',''))" 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID" || true
          fi
          # Delete the tag too
          curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$TAG" || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: XDJ Library Manager v${{ env.APP_VERSION }}
          prerelease: false
          make_latest: true
          body: |
            ## XDJ Library Manager v${{ env.APP_VERSION }}

            Bulk genre & sub-genre tagging for Latin dance MP3s — powered by Gemini AI.

            ---

            ## Download

            | Platform | Download |
            |----------|----------|
            | 🍎 Mac | [XDJ-Library-Manager-mac.zip](https://github.com/${{ github.repository }}/releases/download/v${{ env.APP_VERSION }}/XDJ-Library-Manager-mac.zip) |
            | 🪟 Windows | [XDJ-Library-Manager-windows.zip](https://github.com/${{ github.repository }}/releases/download/v${{ env.APP_VERSION }}/XDJ-Library-Manager-windows.zip) |

            **Mac:** Unzip → double-click `XDJ Library Manager.app`
            > First launch: System Settings → Privacy & Security → Open Anyway

            **Windows:** Unzip → double-click `XDJ Library Manager.exe`

            No Python. No Terminal. No installation.

            ---

            ## First-time setup

            1. Go to [aistudio.google.com](https://aistudio.google.com/) — sign in with Google
            2. Click **Get API key → Create API key**
            3. Open the app → **Settings** tab → paste key → **Save**

            ---

            ## What's in this build

            - AI genre + sub-genre classification (Gemini 2.5 Flash default)
            - Gemini model selector with auto-rotation on rate limits
            - BPM, Camelot key, energy analysis
            - Real-time progress bar with ETA
            - Keyboard shortcuts in review (A/S/E/←/→)
            - Confidence colour coding + bulk approve threshold
            - Audio preview player
            - Tag backup before every write
            - Auto-save every 30 tracks
            - Session save/load, CSV export, folder watcher
            - Taxonomy editor, Spotify enrichment (optional)
            - Version badge in app header

            **Build:** ${{ github.sha }} · ${{ github.event.head_commit.timestamp }}

  build-mac:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Read version
        run: echo "APP_VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pywebview pyinstaller

      - name: Create .env
        run: cp config.example.env .env

      - name: Build .app
        run: |
          pyinstaller \
            --noconfirm \
            --windowed \
            --name "XDJ Library Manager" \
            --icon "app/static/icon.png" \
            --add-data "templates:templates" \
            --add-data "app/static:app/static" \
            --add-data "taxonomy.json:." \
            --add-data "VERSION:." \
            --add-data ".env:." \
            --hidden-import "engineio.async_drivers.threading" \
            --hidden-import "pkg_resources.py2_compat" \
            --hidden-import "webview.platforms.cocoa" \
            --collect-all webview \
            --collect-all librosa \
            --collect-all mutagen \
            --collect-all flask \
            run_app.py

      - name: Ad-hoc sign the app
        run: |
          xattr -cr "dist/XDJ Library Manager.app"
          codesign --force --deep --sign - "dist/XDJ Library Manager.app"

      - name: Zip .app
        run: |
          cd dist && zip -r "../XDJ-Library-Manager-mac.zip" "XDJ Library Manager.app"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          files: XDJ-Library-Manager-mac.zip

  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Read version
        run: echo "APP_VERSION=$(Get-Content VERSION)" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pywebview pyinstaller

      - name: Create .env
        run: copy config.example.env .env

      - name: Build .exe
        run: |
          pyinstaller `
            --noconfirm `
            --windowed `
            --name "XDJ Library Manager" `
            --icon "app/static/icon.png" `
            --add-data "templates;templates" `
            --add-data "app/static;app/static" `
            --add-data "taxonomy.json;." `
            --add-data "VERSION;." `
            --add-data ".env;." `
            --hidden-import "engineio.async_drivers.threading" `
            --hidden-import "pkg_resources.py2_compat" `
            --hidden-import "webview.platforms.edgechromium" `
            --hidden-import "webview.platforms.mshtml" `
            --collect-all webview `
            --collect-all librosa `
            --collect-all mutagen `
            --collect-all flask `
            run_app.py

      - name: Zip output
        run: Compress-Archive -Path "dist\XDJ Library Manager" -DestinationPath "XDJ-Library-Manager-windows.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          files: XDJ-Library-Manager-windows.zip
