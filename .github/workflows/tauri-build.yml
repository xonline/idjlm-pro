name: Tauri Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-13          # Intel
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            ${{
              matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' ||
              matrix.platform == 'macos-13' && 'x86_64-apple-darwin' ||
              ''
            }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node.js (for Tauri CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2.5.0

      - name: Prepare .env for bundle
        shell: bash
        run: |
          if [ ! -f .env ]; then cp config.example.env .env; fi

      - name: Build Tauri app
        env:
          BUILD_ARGS: ${{ matrix.args }}
        run: tauri build $BUILD_ARGS

      - name: Upload macOS .dmg
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: idjlm-pro-dmg-${{ matrix.platform }}
          path: src-tauri/target/*/release/bundle/dmg/*.dmg
          retention-days: 7

      - name: Upload Windows .msi
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: idjlm-pro-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7

      - name: Upload Windows .exe (NSIS installer)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: idjlm-pro-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7
