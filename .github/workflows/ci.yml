name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff
      - name: Lint with ruff
        run: ruff check app/ --select E,F,W --ignore E501,E701
      - name: Run tests
        run: pytest -v --tb=short
      - name: Check Python syntax
        run: python -m py_compile app/__init__.py
      - name: Notify on failure
        if: failure()
        run: |
          curl -sf -X POST "https://jarvis.nowoly.com/ci-webhook" \
            -H "Content-Type: application/json" \
            -H "X-CI-Webhook-Token: ${{ secrets.CI_WEBHOOK_TOKEN }}" \
            -d '{
              "action": "completed",
              "workflow_run": {
                "id": ${{ github.run_id }},
                "name": "${{ github.workflow }}",
                "conclusion": "failure",
                "head_branch": "${{ github.head_ref || github.ref_name }}",
                "head_sha": "${{ github.sha }}",
                "repository": {
                  "full_name": "${{ github.repository }}"
                }
              }
            }' || echo "webhook notification failed (non-fatal)"
