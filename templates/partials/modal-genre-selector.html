<!-- Genre Selector Modal (for export) -->
<div id="genre-selector-modal" class="modal" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="genre-selector-label" aria-hidden="true">
  <div class="modal-content" style="max-width: 340px;">
    <div class="modal-header">
      <h2 id="genre-selector-label">Select Genre to Export</h2>
      <button class="modal-close" id="genre-selector-close">&times;</button>
    </div>
    <div class="modal-body">
      <select id="genre-selector-select" class="input-select" style="width:100%;">
        <option value="">All Genres</option>
      </select>
      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:16px;">
        <button id="genre-selector-cancel" class="btn btn-secondary">Cancel</button>
        <button id="genre-selector-export" class="btn btn-primary">Export</button>
      </div>
    </div>
  </div>
</div>
