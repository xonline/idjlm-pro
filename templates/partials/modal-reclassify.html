<!-- Reclassify Modal -->
<div id="reclassify-modal" class="modal" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="reclassify-label" aria-hidden="true">
  <div class="modal-content modal-sm">
    <div class="modal-header">
      <h2 id="reclassify-label">Re-classify Tracks</h2>
      <button class="modal-close" id="reclassify-close">&times;</button>
    </div>

    <div class="modal-body">
      <p style="color: var(--text-secondary); font-size: 12px; margin-bottom: 16px;" id="reclassify-count">0 tracks selected</p>

      <div class="form-group">
        <label for="reclassify-provider">Provider</label>
        <select id="reclassify-provider" class="input-select">
          <option value="claude">Anthropic (Claude)</option>
          <option value="gemini">Google (Gemini)</option>
          <option value="openrouter">OpenRouter</option>
          <option value="ollama">Ollama (Local)</option>
        </select>
      </div>

      <div class="form-group">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="checkbox" id="reclassify-force" checked style="width: auto; margin: 0;">
          Force re-classify even already-classified tracks
        </label>
      </div>
    </div>

    <div class="modal-footer">
      <button id="reclassify-cancel" class="btn btn-secondary">Cancel</button>
      <button id="reclassify-run" class="btn btn-primary">Re-classify</button>
    </div>
  </div>
</div>
