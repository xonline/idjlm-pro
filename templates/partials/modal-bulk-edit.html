<!-- Bulk Edit Modal -->
<div id="bulk-edit-modal" class="modal" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="bulk-edit-label" aria-hidden="true">
  <div class="modal-content modal-sm">
    <div class="modal-header">
      <h2 id="bulk-edit-label">Bulk Edit</h2>
      <button class="modal-close" id="bulk-edit-close">&times;</button>
    </div>

    <div class="modal-body">
      <p style="color: var(--text-secondary); font-size: 12px; margin-bottom: 16px;" id="bulk-edit-count">0 tracks selected</p>

      <div class="form-group">
        <label for="bulk-genre">Genre (optional)</label>
        <select id="bulk-genre" class="input-select">
          <option value="">— No change —</option>
        </select>
      </div>

      <div class="form-group">
        <label for="bulk-subgenre">Comments (optional)</label>
        <input type="text" id="bulk-subgenre" class="input-text" placeholder="Leave blank for no change">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="bulk-bpm">BPM (optional)</label>
          <input type="number" id="bulk-bpm" class="input-text" min="40" max="200" placeholder="—">
        </div>

        <div class="form-group">
          <label for="bulk-year">Year (optional)</label>
          <input type="number" id="bulk-year" class="input-text" min="1900" max="2100" placeholder="—">
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button id="bulk-edit-cancel" class="btn btn-secondary">Cancel</button>
      <button id="bulk-edit-save" class="btn btn-primary">Apply Changes</button>
    </div>
  </div>
</div>
