<!-- Export Format Modal -->
<div id="export-format-modal" class="modal" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="export-format-label" aria-hidden="true">
  <div class="modal-content modal-sm">
    <div class="modal-header">
      <h2 id="export-format-label">Export Library</h2>
      <button class="modal-close" id="export-format-close">&times;</button>
    </div>

    <div class="modal-body">
      <p style="color: var(--text-secondary); font-size: 12px; margin-bottom: 16px;">Choose export format:</p>

      <div class="form-group">
        <label for="export-genre-filter">Genre Filter (optional)</label>
        <select id="export-genre-filter" class="input-select">
          <option value="">All Genres</option>
        </select>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" id="btn-export-csv">📄 CSV</button>
      <button class="btn btn-secondary" id="btn-export-json">📋 JSON</button>
      <button class="btn btn-secondary" id="btn-export-rekordbox">🎛️ Rekordbox</button>
    </div>
  </div>
</div>
